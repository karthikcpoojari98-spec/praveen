<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Simple Robot</title>
<style>
  body { margin: 0; overflow: hidden; background: #111; }
</style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(6,5,10);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);

// Basic lighting
scene.add(new THREE.AmbientLight(0xffffff, 0.6));

const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5,10,7);
scene.add(light);

// Robot group
const robot = new THREE.Group();

// Materials
const metal = new THREE.MeshStandardMaterial({
  color: 0x888888,
  metalness: 0.7,
  roughness: 0.4
});

const glow = new THREE.MeshStandardMaterial({
  color: 0x00ffff,
  emissive: 0x00ffff,
  emissiveIntensity: 1.5
});

// Body
const body = new THREE.Mesh(new THREE.BoxGeometry(2,3,1.5), metal);
body.position.y = 2;
robot.add(body);

// Head
const head = new THREE.Mesh(new THREE.BoxGeometry(1.5,1.5,1.5), metal);
head.position.y = 4.2;
robot.add(head);

// Eyes
function eye(x) {
  const e = new THREE.Mesh(new THREE.SphereGeometry(0.2,16,16), glow);
  e.position.set(x,4.2,0.8);
  robot.add(e);
}
eye(-0.4);
eye(0.4);

// Arms
function arm(x) {
  const upper = new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.3,1.5), metal);
  upper.position.set(x,3,0);
  robot.add(upper);

  const lower = new THREE.Mesh(new THREE.CylinderGeometry(0.25,0.25,1.5), metal);
  lower.position.set(x,1.8,0);
  robot.add(lower);
}
arm(-1.6);
arm(1.6);

// Legs
function leg(x) {
  const upper = new THREE.Mesh(new THREE.CylinderGeometry(0.4,0.4,1.5), metal);
  upper.position.set(x,1,0);
  robot.add(upper);

  const lower = new THREE.Mesh(new THREE.CylinderGeometry(0.35,0.35,1.5), metal);
  lower.position.set(x,0,0);
  robot.add(lower);
}
leg(-0.6);
leg(0.6);

// Add robot
scene.add(robot);

// Animation
function animate() {
  requestAnimationFrame(animate);

  robot.rotation.y += 0.01; // simple rotation

  controls.update();
  renderer.render(scene, camera);
}
animate();

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
